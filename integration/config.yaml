# config.yaml — SSSH Phase 4 integrated service
# Edit the values marked ← before running on the Pi.

audio:
  device: "hw:1,0"          # ← ALSA device; run `python3 main.py --list-devs` to find it
  pre_gain_db: 26.0          # 24 dB tuned for ~1.5 m (per Phase 3 notes)
  gate_enabled: true         # noise gate ON (recommended for distance)
  agc_enabled: false          # AGC ON; set false for more natural levels at range
  inference_window_s: 1.0    # YAMNet sees 1 s windows
  inference_step_s: 0.5      # stepped every 0.5 s (50% overlap)
  lib_path: "./libaudio_dsp.so"
  log_wav_path: "/home/raspberry_pi4/sssh_main_copy/captures/test_session.wav"

model:
  model_path: "~/sssh_main_copy/AI_model/sssh_head.tflite"   # ← your fine-tuned model FILE
  labels_path: "~/sssh_main_copy/AI_model/custom_labels.txt"                  # ← path to your 11-class label list (txt or csv)
  top_k: 3
  yamnet_model_path: "~/sssh_main_copy/AI_model/yamnet_with_embeddings.tflite"   # ← YAMNet base model for embeddings (two-stage inference)

noise:
  # A window is "noise" only if it is loud AND a disruptive class AND confident,
  # and it must persist past min_event_duration_s to count toward density.
  classify_min_db: -40.0       # ← skip AI classification below this dBFS (too quiet to classify)
  min_confidence: 0.30
  spl_offset_db: 97.0         # ← calibration: SPL ≈ dBFS + this. 0 = relative scale
  spl_yellow_threshold_db: 55.0 # ← Moderate (Yellow) noise threshold
  spl_threshold_db: 75.0    # ← Loud (Red) noise threshold
  min_event_duration_s: 0.7  # ignore blips shorter than this (ambient)
  density_window_s: 30.0     # rolling window for the headline density metric
  
  # Specify explicit noise classes from your 11 custom labels
  disruptive_classes:
    - "A01_Normal_Speech"
    - "A04_Laughter"

  # FSM tunables
  cooldown_s: 2.0              # grace period (s) before ending a noise event
  heartbeat_interval_s: 20.0   # how often to send data in QUIET state (shows people present)
  moderate_send_interval_s: 5.0 # how often to send data during moderate noise
  noise_send_interval_s: 2.0   # how often to send data during loud noise
  unidentified_loud_timeout_s: 2.0  # if unknown sound stays 75+ dB for this long, treat as noise

influx:
  url: "http://100.65.252.55:8086"   # ← your LAPTOP's IP and InfluxDB port through Tailscale network 
  token: "cifDpHRz0-uAMNgoUsoX6-6WBK-EhaVCfofDR2gSLMCdUuj_ZcCr2tNv_QOTan1aUJndJCjCSLmMbDGx960rbw=="                 # ← InfluxDB API token
  org: "Edge_computing"                        # ← your InfluxDB org
  bucket: "Noises"                    # ← target bucket
  device: "pi4-01"                   # tag identifying this device
  location: "room"         # tag identifying where it sits
  flush_interval_s: 2.0






